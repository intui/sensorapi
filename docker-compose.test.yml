version: '3.8'

services:
  test-db:
    image: postgres:14
    container_name: sensor-test-db
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
      POSTGRES_DB: sensor_test_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"  # Use port 5433 to avoid conflicts with local PostgreSQL
    volumes:
      - test_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d sensor_test_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sensor-test-network

volumes:
  test_db_data:

networks:
  sensor-test-network:
    driver: bridge
